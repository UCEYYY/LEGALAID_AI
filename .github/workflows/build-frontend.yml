name: Build Frontend

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: legalaid-frontend
        run: npm install

      - name: Build frontend
        working-directory: legalaid-frontend
        run: npm run build

      - name: Copy dist to backend
        run: |
          mkdir -p backend/public/dist
          cp -r legalaid-frontend/dist/. backend/public/dist/

      - name: Commit and push dist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config advice.addIgnoredFile false
          git add -f backend/public/dist
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: build frontend [skip ci]"
            git push
          fi

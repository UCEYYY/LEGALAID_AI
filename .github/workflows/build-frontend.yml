name: Build Frontend

on:
  push:
    branches: [main]
    paths:
      - 'legalaid-frontend/**'
      - '.github/workflows/build-frontend.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: legalaid-frontend/package-lock.json

      - name: Install dependencies
        working-directory: legalaid-frontend
        run: npm install

      - name: Build frontend
        working-directory: legalaid-frontend
        run: npm run build

      - name: Copy dist to backend
        run: |
          rm -rf backend/public/dist
          mkdir -p backend/public/dist
          cp -r legalaid-frontend/dist/. backend/public/dist/

      - name: Commit and push dist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f backend/public/dist
          git diff --cached --quiet || git commit -m "chore: build frontend [skip ci]"
          git push

services:
  - type: web
    name: legalaid-ai
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: GROQ_API_KEY
        sync: false   # isi manual di dashboard Render
      - key: CORS_ORIGIN
        value: "*"
